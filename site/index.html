<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FluxChi · FocuX Portal</title>
  <style>
    :root {
      --bg: #0b0b0c;
      --panel: #141417;
      --text: #e7e7ea;
      --muted: #a0a0ad;
      --accent: #ff3b30;
      --ok: #34c759;
      --line: #2a2a33;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1d1d24 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, #17171c 0%, var(--panel) 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 6px; font-size: 28px; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    .row { margin-top: 18px; display: grid; gap: 10px; }
    .btn {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      text-decoration: none;
      background: #1a1a20;
      transition: all .18s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: #3a3a48; }
    .btn.primary { border-color: #5a201c; background: #2a1414; }
    .status {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px dashed var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    .ok { color: var(--ok); }
    code {
      background: #111118;
      border: 1px solid #232330;
      border-radius: 6px;
      padding: 2px 6px;
      color: #f2f2f5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>FluxChi · FocuX Portal</h1>
    <p>这是你部署在 <code>focux.me</code> 的跳转入口页，用来快速打开本机 FluxChi 网关与项目资源。</p>

    <div class="row">
      <a class="btn primary" href="http://127.0.0.1:8000/" target="_blank" rel="noopener noreferrer">
        打开本机 Dashboard（127.0.0.1:8000）
      </a>
      <a class="btn" href="http://127.0.0.1:8000/docs" target="_blank" rel="noopener noreferrer">
        打开本机 API Docs
      </a>
      <a class="btn" href="https://github.com/wujiajunhahah/Flux-hardware" target="_blank" rel="noopener noreferrer">
        打开 GitHub 仓库
      </a>
    </div>

    <div id="status" class="status">正在检测本机网关状态...</div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    async function probe() {
      try {
        const res = await fetch("http://127.0.0.1:8000/api/v1/status", { method: "GET" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const mode = data?.data?.transport_mode || "unknown";
        statusEl.innerHTML = '<span class="ok">本机网关在线</span> · mode=' + mode + ' · 现在可以直接点击上面的入口。';
      } catch (_) {
        statusEl.innerHTML = '未检测到本机网关。请先在你的电脑运行：<code>python web/app.py --demo --web-port 8000</code>';
      }
    }
    probe();
  </script>
</body>
</html>
