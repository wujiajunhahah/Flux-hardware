name: FluxChi
options:
  bundleIdPrefix: com.fluxchi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  DEVELOPMENT_TEAM: M4T239BM58
  CODE_SIGN_STYLE: Automatic
  SWIFT_VERSION: "5.9"

targets:
  FluxChi:
    type: application
    platform: iOS
    sources:
      - FluxChi
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.fluxchi.app
      INFOPLIST_FILE: FluxChi/Resources/Info.plist
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "focux 需要蓝牙权限以连接 WAVELETECH EMG 手环，实时接收肌电信号数据。"
      INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: "focux 需要蓝牙权限以连接 WAVELETECH EMG 手环。"
      INFOPLIST_KEY_NSLocalNetworkUsageDescription: "focux 需要访问本地网络以连接运行在电脑上的 EMG 数据服务器。"
      INFOPLIST_KEY_NSCameraUsageDescription: "focux 在严重疲劳提醒时会闪烁手电筒（仅作环境提示），调用手电筒需要相机权限。你可在系统设置中关闭。"
      INFOPLIST_KEY_UIBackgroundModes: "bluetooth-central"
      INFOPLIST_KEY_CFBundleDisplayName: focux
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: M4T239BM58
    entitlements:
      path: FluxChi/FluxChi.entitlements
      properties: {}
