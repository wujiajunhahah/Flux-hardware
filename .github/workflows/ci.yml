# 离线管线自检（无串口/摄像头/HTTP；model/ 通常未提交，ONNX 段自动跳过）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: System sanity check
        run: python tools/system_sanity_check.py -v
