server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;
    access_log /www/wwwlogs/fluxchi_80.access.log;
    error_log /www/wwwlogs/fluxchi_80.error.log warn;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __SERVER_NAME__;
    client_max_body_size 50m;
    access_log /www/wwwlogs/fluxchi_443.access.log;
    error_log /www/wwwlogs/fluxchi_443.error.log warn;

    ssl_certificate __CERT_PATH__;
    ssl_certificate_key __KEY_PATH__;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:__UPSTREAM_PORT__;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
    }
}
